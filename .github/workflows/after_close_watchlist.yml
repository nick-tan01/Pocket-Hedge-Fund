name: Pocket Hedge Fund — After-Close Watchlist

on:
  schedule:
    - cron: '30 21 * * 1-5'   # After regular close in both EDT and EST
  workflow_dispatch:

permissions:
  contents: write

# A9 (audit): this workflow writes dashboard/data.json too — it must share the
# trade pipeline's serialization group or the two can interleave and lose records.
concurrency:
  group: pipeline-data-json
  cancel-in-progress: false

jobs:
  build-watchlist:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo (code from main)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Checkout data branch (canonical journal)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: data
          path: data-branch

      - name: Use latest journal from data branch
        run: cp data-branch/dashboard/data.json dashboard/data.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build after-close watchlist
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python scripts/build_after_close_watchlist.py

      - name: Push updated dashboard data (data branch)
        run: |
          # A9/A10 semantics preserved on the data branch: serialized writers,
          # pull-then-push, genuine conflicts fail LOUDLY.
          cp dashboard/data.json data-branch/dashboard/data.json
          cd data-branch
          git config user.name "nick-tan01"
          git config user.email "${{ secrets.GIT_EMAIL }}"
          git add dashboard/data.json
          if git diff --cached --quiet; then
            echo "No changes to push"
          else
            git commit -m "Auto: after-close watchlist $(date -u +'%Y-%m-%d')"
            git pull --no-rebase origin data
            git push origin HEAD:data
          fi
