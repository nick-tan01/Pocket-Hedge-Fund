name: Pocket Hedge Fund — Market Tick

# Merged sentinel + dashboard snapshot (audit 2026-07-06). The two jobs shared an
# identical cron and each spun its own runner/checkout/pip-install every tick just
# to hit the same Alpaca API. One runner now does both:
#   1. sentinel check (read-only) — may dispatch the Trading Pipeline
#   2. portfolio snapshot refresh — commits to the `data` branch
# NO LLM, NO trading decisions, NO orders happen here.

on:
  schedule:
    # Hourly (audit 2026-07-06): the old */15 cadence was throttled by GitHub to
    # ~every 75-100 min anyway, and a book that trades ~3x/week does not need
    # sub-hourly snapshots. :05 offset avoids top-of-hour scheduler congestion.
    - cron: '5 13-20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # sentinel dispatches trade.yml; guard lists its runs

jobs:
  # GitHub keeps at most ONE pending run per concurrency group, so a tick that
  # enqueued behind a running pipeline would EVICT a queued sentinel-triggered
  # trade run. This guard runs OUTSIDE the concurrency group and skips the tick
  # while any trade run is queued or in progress — the queue slot stays reserved
  # for trade runs, whose loss actually matters. The next tick catches up.
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check for queued/running trading pipeline runs
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          active=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow trade.yml \
                     --status in_progress --json databaseId --jq length)
          queued=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow trade.yml \
                     --status queued --json databaseId --jq length)
          if [ "${active:-0}" != "0" ] || [ "${queued:-0}" != "0" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Trading pipeline active/queued ($active running, $queued queued) — yielding this tick."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  tick:
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Shares the journal-writer serialization group (A9/A10). Job-level (not
    # workflow-level) so the guard above runs before we enter the queue.
    concurrency:
      group: pipeline-data-json
      cancel-in-progress: false

    steps:
      - name: Checkout repo (code from main)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Checkout data branch (canonical journal)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: data
          path: data-branch

      - name: Use latest journal from data branch
        run: cp data-branch/dashboard/data.json dashboard/data.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sentinel check
        id: check
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python sentinel.py

      - name: Trigger main pipeline if event detected
        if: steps.check.outputs.trigger == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Event detected for: ${{ steps.check.outputs.trigger_symbols }}"
          gh workflow run "Pocket Hedge Fund — Trading Pipeline" \
            --ref main \
            --field reason="sentinel_trigger" \
            --field symbols="${{ steps.check.outputs.trigger_symbols }}" \
            --field event_details='${{ steps.check.outputs.trigger_details }}'

      - name: Refresh portfolio snapshot from broker
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python scripts/refresh_snapshot.py

      - name: Push updated dashboard data (data branch)
        run: |
          cp dashboard/data.json data-branch/dashboard/data.json
          cd data-branch
          git config user.name "nick-tan01"
          git config user.email "${{ secrets.GIT_EMAIL }}"
          git add dashboard/data.json
          if git diff --cached --quiet; then
            echo "No changes to push"
          else
            git commit -m "Auto: dashboard snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --no-rebase origin data
            git push origin HEAD:data
          fi
