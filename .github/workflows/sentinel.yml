name: Pocket Hedge Fund — Event Sentinel

on:
  schedule:
    - cron: '*/15 13-20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  sentinel:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install minimal dependencies
        run: pip install yfinance alpaca-py

      - name: Run sentinel check
        id: check
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python sentinel.py

      - name: Trigger main pipeline if event detected
        if: steps.check.outputs.trigger == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Event detected for: ${{ steps.check.outputs.trigger_symbols }}"
          gh workflow run "Pocket Hedge Fund — Trading Pipeline" \
            --ref main \
            --field reason="sentinel_trigger" \
            --field symbols="${{ steps.check.outputs.trigger_symbols }}"
