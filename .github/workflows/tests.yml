name: Pocket Hedge Fund — Tests

# Audit §7.3: the test suite must gate every code change — it runs on every push
# and PR. Pure-logic tests only (no network, no API keys needed).

on:
  push:
    branches: [main]
    paths-ignore:
      - 'dashboard/data.json'   # auto-commits from pipeline runs don't need CI
      - 'docs/**'
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -q
