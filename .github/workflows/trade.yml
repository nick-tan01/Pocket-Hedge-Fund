name: Pocket Hedge Fund — Trading Pipeline

on:
  schedule:
    - cron: '30 13 * * 1-5'   # 8:30am ET (EDT)
    - cron: '0 17 * * 1-5'    # 1:00pm ET (EDT)
  workflow_dispatch:
    inputs:
      reason:
        description: "Run trigger reason"
        required: false
        default: "manual"
      symbols:
        description: "Comma-separated event symbols for sentinel-triggered runs"
        required: false
        default: ""
      event_details:
        description: "Compact JSON event metadata from sentinel"
        required: false
        default: "[]"

permissions:
  contents: write

# C4: serialize all pipeline runs that write dashboard/data.json. The scheduled and
# sentinel-triggered workflows both mutate the same append-only journal; running them
# concurrently let one run's `cp`-overwrite erase another run's just-appended trades,
# desyncing the journal from Alpaca and triggering spurious 24h orphan-closes.
# cancel-in-progress:false => queue, never drop, an overlapping run.
concurrency:
  group: pipeline-data-json
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading pipeline
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_REASON:        ${{ github.event.inputs.reason || 'scheduled' }}
          EVENT_SYMBOLS:     ${{ github.event.inputs.symbols || '' }}
          EVENT_DETAILS:     ${{ github.event.inputs.event_details || '[]' }}
        run: python main.py --now --reason "$RUN_REASON" --symbols "$EVENT_SYMBOLS" --event-details "$EVENT_DETAILS"

      - name: Push updated dashboard data
        run: |
          git config user.name "nick-tan01"
          git config user.email "${{ secrets.GIT_EMAIL }}"
          # C5: this step is the SINGLE push authority. main.py's push_to_github()
          # skips its own commit/push under GitHub Actions (GITHUB_ACTIONS env), so
          # there is no longer a competing in-process push with no rebase.
          # Because runs are serialized by the `concurrency` group, the remote cannot
          # move between our commit and push, so a plain commit -> rebase -> push
          # cleanly replays our single-file change with NO destructive cp-overwrite.
          git add dashboard/data.json
          if git diff --cached --quiet; then
            echo "No changes to push"
          else
            git commit -m "Auto: pipeline run $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Use --no-rebase (merge) instead of --rebase. The rebase strategy fails
            # when two pipeline runs commit different data.json changes in quick
            # succession: rebase replays our commit on top of the remote and hits a
            # content conflict on JSON (git can't auto-merge it). A merge commit
            # handles this cleanly — git creates a merge commit combining both sets of
            # appended records. data.json is append-only so diverging appends are safe
            # to merge; the next run re-reads the full file and sees all records.
            git pull --no-rebase -X theirs origin main || true
            git push
          fi
