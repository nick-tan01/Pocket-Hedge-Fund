name: Pocket Hedge Fund — Trading Pipeline

on:
  schedule:
    - cron: '30 13 * * 1-5'   # 8:30am ET (EDT)
    - cron: '0 17 * * 1-5'    # 1:00pm ET (EDT)
  workflow_dispatch:
    inputs:
      reason:
        description: "Run trigger reason"
        required: false
        default: "manual"
      symbols:
        description: "Comma-separated event symbols for sentinel-triggered runs"
        required: false
        default: ""
      event_details:
        description: "Compact JSON event metadata from sentinel"
        required: false
        default: "[]"

permissions:
  contents: write

concurrency:
  group: trading-pipeline
  cancel-in-progress: false   # queue new runs, never cancel a live pipeline

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading pipeline
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_REASON:        ${{ github.event.inputs.reason || 'scheduled' }}
          EVENT_SYMBOLS:     ${{ github.event.inputs.symbols || '' }}
          EVENT_DETAILS:     ${{ github.event.inputs.event_details || '[]' }}
        run: python main.py --now --reason "$RUN_REASON" --symbols "$EVENT_SYMBOLS" --event-details "$EVENT_DETAILS"

      - name: Push updated dashboard data
        run: |
          git config user.name "nick-tan01"
          git config user.email "${{ secrets.GIT_EMAIL }}"
          git add dashboard/data.json
          git diff --cached --quiet && echo "No staged changes to commit" || git commit -m "Auto: pipeline run $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
