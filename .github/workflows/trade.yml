name: Pocket Hedge Fund — Trading Pipeline

on:
  schedule:
    # 8:30am ET = 12:30 UTC (EST) / 13:30 UTC (EDT)
    # Using 13:30 UTC which covers EDT (summer). Adjust to 12:30 in winter.
    - cron: '30 13 * * 1-5'
    # 1:00pm ET = 17:00 UTC (EDT)
    - cron: '0 17 * * 1-5'

  # Also allows manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading pipeline
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py --now

      - name: Commit and push updated dashboard data
        run: |
          git config user.name  "Pocket Hedge Fund Bot"
          git config user.email "bot@pocket-hedge-fund"
          git add dashboard/data.json
          git diff --cached --quiet || git commit -m "Auto: pipeline run $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
