name: Pocket Hedge Fund — Trading Pipeline

on:
  schedule:
    - cron: '30 13 * * 1-5'   # 8:30am ET (EDT)
    - cron: '0 17 * * 1-5'    # 1:00pm ET (EDT)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading pipeline
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py --now

      - name: Push updated dashboard data
        run: |
          git config user.name  "nick-tan01"
          git config user.email "${{ secrets.GIT_EMAIL }}"
          git pull --rebase origin main
          git add dashboard/data.json
          git diff --cached --quiet && echo "No changes to push" || (git commit -m "Auto: pipeline run $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)
