name: Pocket Hedge Fund — Trading Pipeline

on:
  schedule:
    - cron: '30 13 * * 1-5'   # 9:30am EDT / 8:30am EST (UTC cron does not track DST)
    - cron: '0 17 * * 1-5'    # 1:00pm EDT / 12:00pm EST
  workflow_dispatch:
    inputs:
      reason:
        description: "Run trigger reason"
        required: false
        default: "manual"
      symbols:
        description: "Comma-separated event symbols for sentinel-triggered runs"
        required: false
        default: ""
      event_details:
        description: "Compact JSON event metadata from sentinel"
        required: false
        default: "[]"

permissions:
  contents: write

# C4: serialize all pipeline runs that write dashboard/data.json. The scheduled and
# sentinel-triggered workflows both mutate the same append-only journal; running them
# concurrently let one run's `cp`-overwrite erase another run's just-appended trades,
# desyncing the journal from Alpaca and triggering spurious 24h orphan-closes.
# NOTE (audit 2026-07-06): cancel-in-progress:false does NOT mean "queue, never drop".
# GitHub keeps at most ONE pending run per concurrency group — a newer arrival evicts
# the older pending run. That is why snapshot.yml checks for queued/running trade runs
# and yields instead of enqueueing: a queued TRADE run must never be evicted by a
# snapshot tick. Losing a pending snapshot is harmless; losing a trade run is not.
concurrency:
  group: pipeline-data-json
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # DATA-BRANCH SPLIT (audit 2026-07-06): code comes from main, the journal
      # (dashboard/data.json) lives on the dedicated `data` branch. Auto-commits no
      # longer land on main, so pushing code can't race the journal, main's history
      # stays pure code, and Vercel stops rebuilding the site 10-14x/day just to
      # ship a JSON refresh (the dashboard fetches the data branch directly).
      - name: Checkout repo (code from main)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # A10: latest code, not the trigger-time SHA — a run queued behind another
          # (pipeline-data-json group) must see its predecessor's world, not a stale one.
          ref: main

      - name: Checkout data branch (canonical journal)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: data
          path: data-branch

      - name: Use latest journal from data branch
        run: cp data-branch/dashboard/data.json dashboard/data.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading pipeline
        id: pipeline
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_REASON:        ${{ github.event.inputs.reason || 'scheduled' }}
          EVENT_SYMBOLS:     ${{ github.event.inputs.symbols || '' }}
          EVENT_DETAILS:     ${{ github.event.inputs.event_details || '[]' }}
        run: python main.py --now --reason "$RUN_REASON" --symbols "$EVENT_SYMBOLS" --event-details "$EVENT_DETAILS"

      - name: Push updated dashboard data
        # Journal salvage (audit 2026-07-06): this step used to run only on success, so
        # a crash AFTER trades executed discarded every log_trade_open/log_debate/
        # log_risk_decision written that run — reconcile then re-adopted the positions
        # with conviction=6 and no debate record, silently biasing the decision-quality
        # scorecard. Push whatever the journal contains even when the pipeline step
        # fails; the job still goes red because the pipeline step itself failed.
        if: ${{ !cancelled() && contains(fromJSON('["success","failure"]'), steps.pipeline.outcome) }}
        run: |
          # C5: this step is the SINGLE push authority. main.py's push_to_github()
          # skips its own commit/push under GitHub Actions (GITHUB_ACTIONS env).
          # A9: no -X theirs / no '|| true' — a genuine conflict fails LOUDLY.
          # Journal commits go to the `data` branch, never main.
          cp dashboard/data.json data-branch/dashboard/data.json
          cd data-branch
          git config user.name "nick-tan01"
          git config user.email "${{ secrets.GIT_EMAIL }}"
          git add dashboard/data.json
          if git diff --cached --quiet; then
            echo "No changes to push"
          else
            MSG="Auto: pipeline run $(date -u +'%Y-%m-%d %H:%M UTC')"
            if [ "${{ steps.pipeline.outcome }}" != "success" ]; then
              MSG="$MSG (journal salvage after failed run)"
            fi
            git commit -m "$MSG"
            git pull --no-rebase origin data
            git push origin HEAD:data
          fi

      # Recommendation #1: alert on LLM outages. Runs AFTER the push so the journal
      # always commits; a degraded run then turns this job RED (→ GitHub email) instead
      # of failing silently like the 2026-06-15 model-EOL outage did for 3 days.
      - name: Check LLM health (alert on outage)
        run: python scripts/check_llm_health.py

      # Alert if a trade executed at the broker but its open_trade record didn't persist
      # this run (the journal⇄broker desync that left MU/HOOD/AMAT untracked). The next
      # run's auto-reconcile self-heals it; this turns the job RED as an early signal.
      - name: Check journal/broker sync (alert on drift)
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python scripts/check_journal_sync.py
